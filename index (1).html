<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Personal OS</title>
  <meta name="description" content="Daily Personal OS — MVP платформы ежедневного планирования жизни" />

  <!-- Tailwind CDN: подходит для быстрого MVP и GitHub Pages -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel для JSX в одном HTML-файле. Для production лучше Vite-сборка, но для GitHub Pages MVP это работает. -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .glass { background: rgba(255,255,255,.82); backdrop-filter: blur(18px); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const todayISO = () => new Date().toISOString().slice(0, 10);
    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

    const STORAGE_KEY = "daily-personal-os-index-html-v1";

    const defaultState = {
      dailyPlan: {
        plan_date: todayISO(),
        energy_level: "medium",
        mood_score: 7,
        main_focus: "Медицина + работа + тело + питание без хаоса",
        top_priorities: [
          { id: uid(), title: "60 минут учебы по медицине", done: false },
          { id: uid(), title: "Закрыть 1 ключевую рабочую задачу", done: false },
          { id: uid(), title: "30 минут движения / тренировки", done: false },
        ],
        day_summary: "",
        ai_recommendation: "",
      },
      tasks: [
        {
          id: uid(),
          title: "Собрать MVP Daily Personal OS",
          description: "Главный экран, задачи, спорт, учеба, питание, чтение, AI-разбор",
          category: "work",
          priority: "high",
          status: "in_progress",
          deadline: todayISO(),
          result_link: "",
        },
      ],
      study_sessions: [
        {
          id: uid(),
          session_date: todayISO(),
          topic: "Внебольничная пневмония: клиника, диагностика, красные флаги",
          source: "Клинические рекомендации / лекция / конспект",
          duration_minutes: 60,
          format: "reading",
          key_takeaway: "",
          weak_points: "",
          completed: false,
        },
      ],
      workouts: [
        {
          id: uid(),
          workout_date: todayISO(),
          workout_type: "Прогулка + легкая силовая",
          duration_minutes: 30,
          intensity: "light",
          body_feeling: 7,
          completed: false,
          notes: "",
        },
      ],
      meals: [
        {
          id: uid(),
          meal_date: todayISO(),
          meal_type: "Завтрак",
          food_description: "Белковый прием пищи + овощи",
          protein_estimate: 25,
          calories_estimate: 400,
          satiety_score: 7,
          notes: "",
        },
      ],
      reading_sessions: [
        {
          id: uid(),
          session_date: todayISO(),
          title: "Книга / статья дня",
          pages_read: 10,
          key_idea: "",
          application_idea: "",
        },
      ],
      weekly_reviews: [],
      ai_insights: [],
    };

    const supabaseSQL = `
create extension if not exists "uuid-ossp";

create table if not exists daily_plans (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  plan_date date not null,
  energy_level text default 'medium',
  mood_score int default 7,
  main_focus text,
  top_priorities jsonb default '[]'::jsonb,
  day_summary text,
  ai_recommendation text,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

create table if not exists tasks (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  title text not null,
  description text,
  category text default 'work',
  priority text default 'medium',
  status text default 'todo',
  deadline date,
  result_link text,
  created_at timestamptz default now()
);

create table if not exists study_sessions (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  session_date date not null,
  topic text not null,
  source text,
  duration_minutes int default 30,
  format text default 'reading',
  key_takeaway text,
  weak_points text,
  completed boolean default false,
  created_at timestamptz default now()
);

create table if not exists workouts (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  workout_date date not null,
  workout_type text not null,
  duration_minutes int default 30,
  intensity text default 'medium',
  body_feeling int default 7,
  completed boolean default false,
  notes text,
  created_at timestamptz default now()
);

create table if not exists meals (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  meal_date date not null,
  meal_type text not null,
  food_description text not null,
  protein_estimate int default 0,
  calories_estimate int default 0,
  satiety_score int default 7,
  notes text,
  created_at timestamptz default now()
);

create table if not exists reading_sessions (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  session_date date not null,
  title text not null,
  pages_read int default 0,
  key_idea text,
  application_idea text,
  created_at timestamptz default now()
);

create table if not exists weekly_reviews (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  week_start date not null,
  week_end date not null,
  wins text,
  problems text,
  metrics jsonb default '{}'::jsonb,
  ai_plan_next_week text,
  created_at timestamptz default now()
);

create table if not exists ai_insights (
  id uuid primary key default uuid_generate_v4(),
  user_id uuid,
  insight_date date not null,
  insight_type text not null,
  content text not null,
  created_at timestamptz default now()
);
`;

    const icons = {
      home: "🏠",
      week: "📅",
      tasks: "🎯",
      medicine: "🩺",
      sport: "🏋️",
      nutrition: "🥗",
      reading: "📚",
      ai: "🧠",
      stats: "📊",
      plus: "＋",
      save: "💾",
      spark: "✨",
      moon: "🌙",
      delete: "🗑",
      check: "✅",
      activity: "⚡",
    };

    const navItems = [
      { key: "today", label: "Сегодня", icon: icons.home },
      { key: "week", label: "Неделя", icon: icons.week },
      { key: "tasks", label: "Рабочие задачи", icon: icons.tasks },
      { key: "medicine", label: "Учеба / медицина", icon: icons.medicine },
      { key: "sport", label: "Спорт", icon: icons.sport },
      { key: "nutrition", label: "Питание", icon: icons.nutrition },
      { key: "reading", label: "Чтение", icon: icons.reading },
      { key: "ai", label: "Вечерний AI-разбор", icon: icons.ai },
      { key: "stats", label: "Статистика", icon: icons.stats },
    ];

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState;
      } catch {
        return defaultState;
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function cls(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function Badge({ children, tone = "slate" }) {
      const tones = {
        slate: "bg-slate-100 text-slate-700 border-slate-200",
        blue: "bg-blue-50 text-blue-700 border-blue-100",
        cyan: "bg-cyan-50 text-cyan-700 border-cyan-100",
        green: "bg-emerald-50 text-emerald-700 border-emerald-100",
        amber: "bg-amber-50 text-amber-700 border-amber-100",
        rose: "bg-rose-50 text-rose-700 border-rose-100",
      };

      return (
        <span className={cls("inline-flex rounded-full border px-2.5 py-1 text-xs font-semibold", tones[tone])}>
          {children}
        </span>
      );
    }

    function Button({ children, variant = "primary", className = "", ...props }) {
      const variants = {
        primary: "bg-slate-950 text-white hover:bg-slate-800",
        cyan: "bg-cyan-400 text-slate-950 hover:bg-cyan-300",
        soft: "bg-slate-100 text-slate-900 hover:bg-slate-200",
        danger: "bg-rose-50 text-rose-700 hover:bg-rose-100",
      };

      return (
        <button
          {...props}
          className={cls(
            "inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2.5 text-sm font-bold transition active:scale-[.98]",
            variants[variant],
            className
          )}
        >
          {children}
        </button>
      );
    }

    function Card({ title, icon, children, action, className = "" }) {
      return (
        <section className={cls("rounded-[1.7rem] border border-slate-200 bg-white/90 p-5 shadow-sm shadow-slate-200/60", className)}>
          <div className="mb-4 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              {icon && <div className="grid h-10 w-10 place-items-center rounded-2xl bg-slate-950 text-lg text-cyan-300">{icon}</div>}
              <h2 className="text-base font-bold text-slate-950">{title}</h2>
            </div>
            {action}
          </div>
          {children}
        </section>
      );
    }

    function Field({ label, children }) {
      return (
        <label className="block">
          <div className="mb-1.5 text-xs font-bold uppercase tracking-wide text-slate-500">{label}</div>
          {children}
        </label>
      );
    }

    function Input(props) {
      return (
        <input
          {...props}
          className={cls(
            "w-full rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-900 outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-100",
            props.className
          )}
        />
      );
    }

    function Select(props) {
      return (
        <select
          {...props}
          className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-900 outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-100"
        />
      );
    }

    function Textarea(props) {
      return (
        <textarea
          {...props}
          className="min-h-[110px] w-full rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-900 outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-100"
        />
      );
    }

    function Metric({ label, value, sub, icon }) {
      return (
        <div className="rounded-[1.5rem] border border-slate-200 bg-white p-4 shadow-sm">
          <div className="flex items-center justify-between">
            <div className="text-xs font-bold uppercase tracking-wide text-slate-500">{label}</div>
            <div className="text-lg">{icon}</div>
          </div>
          <div className="mt-2 text-2xl font-black text-slate-950">{value}</div>
          {sub && <div className="mt-1 text-xs text-slate-500">{sub}</div>}
        </div>
      );
    }

    function ProgressBar({ value }) {
      const safe = Math.max(0, Math.min(100, Number(value) || 0));
      return (
        <div className="h-2 rounded-full bg-slate-100">
          <div className="h-2 rounded-full bg-cyan-400 transition-all" style={{ width: `${safe}%` }} />
        </div>
      );
    }

    function Empty({ text }) {
      return <div className="rounded-2xl border border-dashed border-slate-200 p-5 text-sm text-slate-500">{text}</div>;
    }

    function App() {
      const [active, setActive] = useState("today");
      const [state, setState] = useState(loadState);

      useEffect(() => saveState(state), [state]);

      const today = state.dailyPlan.plan_date || todayISO();

      const todayTasks = state.tasks.filter((item) => !item.deadline || item.deadline === today);
      const todayStudy = state.study_sessions.filter((item) => item.session_date === today);
      const todayWorkouts = state.workouts.filter((item) => item.workout_date === today);
      const todayMeals = state.meals.filter((item) => item.meal_date === today);
      const todayReading = state.reading_sessions.filter((item) => item.session_date === today);

      const stats = useMemo(() => {
        const total =
          state.dailyPlan.top_priorities.length +
          todayTasks.length +
          todayStudy.length +
          todayWorkouts.length +
          todayReading.length;

        const done =
          state.dailyPlan.top_priorities.filter((p) => p.done).length +
          todayTasks.filter((t) => t.status === "done").length +
          todayStudy.filter((s) => s.completed).length +
          todayWorkouts.filter((w) => w.completed).length +
          todayReading.filter((r) => Number(r.pages_read) > 0).length;

        const progress = total ? Math.round((done / total) * 100) : 0;
        const protein = todayMeals.reduce((sum, meal) => sum + Number(meal.protein_estimate || 0), 0);
        const calories = todayMeals.reduce((sum, meal) => sum + Number(meal.calories_estimate || 0), 0);
        const studyMinutes = todayStudy.reduce((sum, s) => sum + Number(s.duration_minutes || 0), 0);
        const sportMinutes = todayWorkouts.reduce((sum, w) => sum + Number(w.duration_minutes || 0), 0);
        const pages = todayReading.reduce((sum, r) => sum + Number(r.pages_read || 0), 0);

        return { total, done, progress, protein, calories, studyMinutes, sportMinutes, pages };
      }, [state, todayTasks, todayStudy, todayWorkouts, todayMeals, todayReading]);

      function updateDailyPlan(patch) {
        setState((prev) => ({ ...prev, dailyPlan: { ...prev.dailyPlan, ...patch } }));
      }

      function togglePriority(priorityId) {
        setState((prev) => ({
          ...prev,
          dailyPlan: {
            ...prev.dailyPlan,
            top_priorities: prev.dailyPlan.top_priorities.map((p) =>
              p.id === priorityId ? { ...p, done: !p.done } : p
            ),
          },
        }));
      }

      function updatePriority(priorityId, title) {
        setState((prev) => ({
          ...prev,
          dailyPlan: {
            ...prev.dailyPlan,
            top_priorities: prev.dailyPlan.top_priorities.map((p) =>
              p.id === priorityId ? { ...p, title } : p
            ),
          },
        }));
      }

      function addItem(collection, item) {
        setState((prev) => ({ ...prev, [collection]: [{ id: uid(), ...item }, ...prev[collection]] }));
      }

      function updateItem(collection, itemId, patch) {
        setState((prev) => ({
          ...prev,
          [collection]: prev[collection].map((item) => (item.id === itemId ? { ...item, ...patch } : item)),
        }));
      }

      function deleteItem(collection, itemId) {
        setState((prev) => ({ ...prev, [collection]: prev[collection].filter((item) => item.id !== itemId) }));
      }

      function generateMorningPlan() {
        const energy = state.dailyPlan.energy_level;
        const priorities =
          energy === "low"
            ? ["30–45 минут медицины", "1 рабочая задача без перегруза", "20 минут прогулки"]
            : energy === "high"
            ? ["90 минут медицины", "2 рабочие задачи", "45 минут тренировки"]
            : ["60 минут медицины", "1–2 рабочие задачи", "30 минут движения"];

        const mode = energy === "low" ? "восстановительный" : energy === "high" ? "интенсивный" : "сбалансированный";

        updateDailyPlan({
          main_focus: `${mode} день: медицина, работа, тело и питание без хаоса`,
          top_priorities: priorities.map((title) => ({ id: uid(), title, done: false })),
          ai_recommendation: `План адаптирован под уровень энергии: ${energy}. Главный принцип: не больше 3 ключевых задач. Сначала самый важный блок, затем питание и восстановление.`,
        });
      }

      function generateEveningReview() {
        const missing = [];
        if (!todayStudy.some((s) => s.completed)) missing.push("учеба по медицине");
        if (!todayWorkouts.some((w) => w.completed)) missing.push("спорт/движение");
        if (!todayMeals.length) missing.push("питание");
        if (!todayTasks.some((t) => t.status === "done")) missing.push("рабочая задача");

        const content = `Итог дня: выполнено ${stats.done} из ${stats.total} ключевых пунктов (${stats.progress}%). ${
          missing.length ? `Зоны внимания: ${missing.join(", ")}.` : "День закрыт сбалансированно."
        } Завтра оставь 3 главных приоритета, начни с самого энергоемкого блока и заранее зафиксируй питание.`;

        updateDailyPlan({ day_summary: content, ai_recommendation: content });
        addItem("ai_insights", { insight_date: today, insight_type: "evening_review", content });
      }

      function generateWeeklyReview() {
        const doneTasks = state.tasks.filter((t) => t.status === "done").length;
        const completedStudy = state.study_sessions.filter((s) => s.completed).length;
        const completedWorkouts = state.workouts.filter((w) => w.completed).length;
        const pages = state.reading_sessions.reduce((sum, r) => sum + Number(r.pages_read || 0), 0);

        const content = `Неделя: закрыто рабочих задач — ${doneTasks}, учебных сессий — ${completedStudy}, тренировок — ${completedWorkouts}, страниц чтения — ${pages}. Следующая неделя: 4 учебных блока по медицине, 3 тренировки, ежедневный короткий план питания и не больше 3 главных задач в день.`;

        addItem("weekly_reviews", {
          week_start: today,
          week_end: today,
          wins: "Система запущена. Есть базовый трекинг по всем направлениям.",
          problems: "Главный риск — перегруз задачами и нерегулярное заполнение.",
          metrics: { doneTasks, completedStudy, completedWorkouts, pages },
          ai_plan_next_week: content,
        });
        addItem("ai_insights", { insight_date: today, insight_type: "weekly_review", content });
        setActive("week");
      }

      function resetData() {
        if (confirm("Очистить все данные и вернуть демо-версию?")) {
          setState(defaultState);
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      function exportJSON() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `daily-personal-os-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      return (
        <div className="min-h-screen bg-[radial-gradient(circle_at_top_left,#cffafe_0,#f8fafc_34%,#e0e7ff_100%)] text-slate-900">
          <div className="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-4 p-4 lg:flex-row lg:p-6">

            <aside className="rounded-[2rem] border border-white/70 bg-slate-950 p-4 text-white shadow-2xl shadow-slate-300/60 lg:sticky lg:top-6 lg:h-[calc(100vh-3rem)] lg:w-72">
              <div className="mb-8 flex items-center gap-3 px-2">
                <div className="grid h-11 w-11 place-items-center rounded-2xl bg-cyan-400 text-xl text-slate-950">{icons.activity}</div>
                <div>
                  <div className="text-lg font-black tracking-tight">Daily Personal OS</div>
                  <div className="text-xs text-slate-400">medical productivity MVP</div>
                </div>
              </div>

              <nav className="grid gap-1.5">
                {navItems.map((item) => {
                  const selected = active === item.key;
                  return (
                    <button
                      key={item.key}
                      onClick={() => setActive(item.key)}
                      className={cls(
                        "flex items-center justify-between rounded-2xl px-3 py-3 text-left text-sm transition",
                        selected ? "bg-white text-slate-950" : "text-slate-300 hover:bg-white/10 hover:text-white"
                      )}
                    >
                      <span className="flex items-center gap-3">
                        <span>{item.icon}</span>
                        {item.label}
                      </span>
                      {selected && <span>›</span>}
                    </button>
                  );
                })}
              </nav>

              <div className="mt-6 rounded-3xl border border-white/10 bg-white/5 p-4">
                <div className="mb-2 text-sm font-bold text-cyan-200">{icons.spark} MVP-логика</div>
                <p className="text-xs leading-5 text-slate-400">
                  Сейчас данные сохраняются в браузере. Для командной работы подключи Supabase.
                </p>
              </div>

              <div className="mt-4 grid gap-2">
                <Button variant="soft" className="w-full" onClick={exportJSON}>Экспорт JSON</Button>
                <Button variant="danger" className="w-full" onClick={resetData}>Сбросить данные</Button>
              </div>
            </aside>

            <main className="flex-1">
              <header className="mb-5 rounded-[2rem] border border-white/70 bg-white/80 p-5 shadow-sm backdrop-blur">
                <div className="flex flex-col justify-between gap-4 md:flex-row md:items-center">
                  <div>
                    <div className="mb-2 flex flex-wrap items-center gap-2">
                      <Badge tone="cyan">single index.html</Badge>
                      <Badge tone="blue">GitHub Pages</Badge>
                      <Badge tone="green">localStorage</Badge>
                    </div>
                    <h1 className="text-2xl font-black tracking-tight text-slate-950 md:text-3xl">
                      Персональный центр управления днем
                    </h1>
                    <p className="mt-2 max-w-3xl text-sm leading-6 text-slate-600">
                      Спорт, медицина, чтение, рабочие задачи, питание и AI-разбор в одной системе.
                    </p>
                  </div>

                  <div className="flex flex-wrap gap-2">
                    <Button variant="cyan" onClick={generateMorningPlan}>{icons.spark} Утренний AI-план</Button>
                    <Button variant="primary" onClick={generateEveningReview}>{icons.moon} Вечерний разбор</Button>
                  </div>
                </div>
              </header>

              {active === "today" && (
                <TodayScreen
                  state={state}
                  stats={stats}
                  todayWorkouts={todayWorkouts}
                  todayStudy={todayStudy}
                  todayReading={todayReading}
                  todayMeals={todayMeals}
                  updateDailyPlan={updateDailyPlan}
                  togglePriority={togglePriority}
                  updatePriority={updatePriority}
                />
              )}

              {active === "tasks" && (
                <TasksScreen
                  items={state.tasks}
                  addItem={addItem}
                  updateItem={updateItem}
                  deleteItem={deleteItem}
                />
              )}

              {active === "medicine" && (
                <StudyScreen
                  items={state.study_sessions}
                  addItem={addItem}
                  updateItem={updateItem}
                  deleteItem={deleteItem}
                  today={today}
                />
              )}

              {active === "sport" && (
                <SportScreen
                  items={state.workouts}
                  addItem={addItem}
                  updateItem={updateItem}
                  deleteItem={deleteItem}
                  today={today}
                />
              )}

              {active === "nutrition" && (
